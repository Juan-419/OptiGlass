<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiGlass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f6f7f8;
      --band: #eceff1;
      --surface: #ffffff;
      --surface-2: #f1f3f4;
      --border: #d5dade;
      --border-strong: #aeb7bd;
      --text: #172025;
      --muted: #65737c;
      --soft: #8b9aa3;
      --accent: #087f7a;
      --accent-strong: #075f5b;
      --amber: #9a6412;
      --red: #c74f2b;
      --green: #16805e;
      --focus: rgba(8, 127, 122, 0.24);
      --shadow: 0 14px 34px rgba(18, 31, 37, 0.08);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 10px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111719;
        --band: #182225;
        --surface: #1d282b;
        --surface-2: #253236;
        --border: #334247;
        --border-strong: #52656d;
        --text: #edf3f4;
        --muted: #a8b6bc;
        --soft: #7d9098;
        --accent: #42c2b4;
        --accent-strong: #7ee0d5;
        --amber: #dda23a;
        --red: #ed7c58;
        --green: #55c594;
        --focus: rgba(66, 194, 180, 0.28);
        --shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
      }
    }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(180deg, var(--band), var(--bg) 260px);
      color: var(--text);
      font-family: var(--font);
      padding: 24px;
    }

    button, input {
      color: inherit;
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .panel,
    .result-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      color: var(--soft);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    input[type="number"],
    select {
      width: 100%;
      min-width: 0;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      padding: 0 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 16px) 16px,
        calc(100% - 11px) 16px;
      background-repeat: no-repeat;
      background-size: 5px 5px, 5px 5px;
      padding-right: 34px;
    }

    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus);
      background: var(--surface);
    }

    .field-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 0;
    }

    .cuts-list {
      display: grid;
      gap: 8px;
      max-height: 350px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .cut-item {
      display: grid;
      grid-template-columns: 28px minmax(68px, 1fr) minmax(68px, 1fr) 64px 32px 32px;
      gap: 7px;
      align-items: end;
      background: var(--surface-2);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 8px;
    }

    .cut-index {
      align-self: center;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .cut-field {
      display: grid;
      gap: 4px;
    }

    .cut-field label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cut-field input {
      height: 34px;
      background: var(--surface);
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--border-strong);
      color: var(--text);
    }

    .icon-btn.danger:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      border-radius: var(--radius-md);
      padding: 0 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn:hover {
      border-color: var(--border-strong);
      background: var(--surface-2);
    }

    .btn.primary {
      width: 100%;
      min-height: 44px;
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      margin-top: 12px;
    }

    .btn.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .btn.subtle {
      color: var(--muted);
    }

    .empty-state {
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--muted);
      padding: 18px;
      text-align: center;
      font-size: 13px;
    }

    .error {
      display: none;
      margin-top: 12px;
      border-left: 4px solid var(--red);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--red) 12%, transparent);
      color: var(--text);
      padding: 11px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .error.visible { display: block; }

    .result-panel {
      display: none;
      overflow: hidden;
    }

    .result-panel.visible {
      display: block;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .metric {
      min-height: 86px;
      background: var(--surface);
      padding: 15px;
    }

    .metric .value {
      margin-bottom: 7px;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 760;
      line-height: 1;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .metric.good .value { color: var(--green); }
    .metric.warn .value { color: var(--amber); }
    .metric.bad .value { color: var(--red); }

    .advice {
      margin: 0;
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
    }

    .advice.good { border-left: 4px solid var(--green); }
    .advice.warn { border-left: 4px solid var(--amber); }
    .advice.bad { border-left: 4px solid var(--red); }

    .canvas-section {
      padding: 18px;
    }

    .canvas-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .canvas-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
    }

    canvas {
      display: block;
      width: 100% !important;
      height: auto;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 14px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      flex: 0 0 auto;
    }

    .footer {
      margin-top: 16px;
      color: var(--soft);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 880px) {
      body { padding: 16px; }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: stretch;
      }

      .toolbar .btn {
        flex: 1 1 140px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .panel { padding: 14px; }

      .sheet-grid {
        grid-template-columns: 1fr;
      }

      .cut-item {
        grid-template-columns: 28px 1fr 1fr;
      }

      .cut-field.qty {
        grid-column: 2 / 3;
      }

      .cut-item .icon-btn {
        align-self: end;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    /* === NUEVOS ESTILOS v1.4 ===
    .multi-sheets-head {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 10px 18px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
    .sheet-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sheet-tab {
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .sheet-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .piece-list-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .piece-list-table th {
      text-align: left;
      padding: 6px 10px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .piece-list-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .piece-list-table tr:last-child td { border-bottom: none; }
    .piece-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .cost-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 18px;
      font-size: 13px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }
    .cost-row strong { color: var(--text); font-weight: 600; }
    .cost-block {
      background: var(--surface-2);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin: 0 18px 12px;
    }
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      width: min(560px, 100%);
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    .history-item {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .history-item:hover { background: var(--surface-2); }
    .history-item:last-child { border-bottom: none; }
    .history-item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .history-client { font-weight: 500; font-size: 14px; color: var(--text); }
    .history-date { font-size: 11px; color: var(--muted); }
    .history-meta { font-size: 12px; color: var(--muted); }
    .history-empty { padding: 32px 18px; text-align: center; font-size: 13px; color: var(--muted); }
    .history-actions { display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>OptiGlass</h1>
        <p class="subtitle">Optimizador de cortes rectangulares para laminas de vidrio.</p>
      </div>
      <div class="toolbar" aria-label="Acciones de la aplicacion">
        <button class="btn subtle" id="sample-btn" type="button">Ejemplo</button>
        <button class="btn subtle" id="clear-btn" type="button">Limpiar</button>
        <button class="btn subtle" id="history-btn" type="button">Historial</button>
        <button class="btn" id="export-btn" type="button" disabled>Exportar PDF</button>
      </div>
    </header>

    <section class="layout">
      <div class="stack">

        <!-- Cliente -->
        <section class="panel" aria-labelledby="client-title">
          <div class="panel-head">
            <h2 class="panel-title" id="client-title">Cliente</h2>
          </div>
          <div class="sheet-grid">
            <div class="field full">
              <label for="client-name">Nombre del cliente</label>
              <input type="text" id="client-name" placeholder="ej. Juan Pérez" autocomplete="off">
            </div>
            <div class="field full">
              <label for="client-notes">Notas del pedido (opcional)</label>
              <input type="text" id="client-notes" placeholder="ej. Medidas exactas, urgente..." autocomplete="off">
            </div>
          </div>
        </section>

        <!-- Lamina -->
        <section class="panel" aria-labelledby="sheet-title">
          <div class="panel-head">
            <h2 class="panel-title" id="sheet-title">Lamina disponible</h2>
          </div>
          <div class="sheet-grid">
            <div class="field">
              <label for="sheet-w">Ancho (cm)</label>
              <input type="number" id="sheet-w" value="250" min="1" step="0.1" inputmode="decimal">
            </div>
            <div class="field">
              <label for="sheet-h">Alto (cm)</label>
              <input type="number" id="sheet-h" value="360" min="1" step="0.1" inputmode="decimal">
            </div>
            <div class="field full">
              <label for="thickness">Espesor del vidrio</label>
              <select id="thickness">
                <option value="4">4 mm - Ventanas pequenas o claraboyas</option>
                <option value="6" selected>6 mm - Ventanas de viviendas y mesas</option>
                <option value="8">8 mm - Puertas de ducha</option>
                <option value="10">10 mm o mas - Mamparas y divisiones</option>
              </select>
              <p class="field-hint" id="thickness-hint"></p>
            </div>
            <div class="field full">
              <label for="kerf">Margen de corte / kerf (mm)</label>
              <input type="number" id="kerf" value="3" min="3" max="20" step="0.5" inputmode="decimal">
            </div>
            <div class="field full">
              <label for="price-m2">Precio por m² (opcional)</label>
              <input type="number" id="price-m2" value="" min="0" step="100" inputmode="decimal" placeholder="ej. 85000">
              <p class="field-hint">Si ingresas el precio, se calculara el costo del pedido y del desperdicio.</p>
            </div>
          </div>
        </section>

        <!-- Piezas -->
        <section class="panel" aria-labelledby="pieces-title">
          <div class="panel-head">
            <h2 class="panel-title" id="pieces-title">Piezas</h2>
            <button class="btn" id="add-btn" type="button">+ Agregar</button>
          </div>
          <div class="cuts-list" id="cuts-list"></div>
          <p class="error" id="err-msg" role="alert"></p>
          <button class="btn primary" id="calc-btn" type="button">Calcular corte optimo</button>
        </section>
      </div>

      <!-- Resultado -->
      <section class="result-panel" id="result-area" aria-live="polite">
        <div class="metrics" id="metrics"></div>
        <p class="advice" id="advice-box"></p>

        <!-- Multiples laminas -->
        <div id="multi-sheets-area" style="display:none">
          <div class="multi-sheets-head">
            <span id="multi-sheets-label"></span>
            <div class="sheet-tabs" id="sheet-tabs"></div>
          </div>
        </div>

        <div class="canvas-section">
          <div class="canvas-head">
            <h2 class="panel-title">Distribucion visual</h2>
            <span id="sheet-indicator" style="font-size:12px;color:var(--muted)"></span>
          </div>
          <div class="canvas-wrap" id="canvas-wrap">
            <canvas id="cv" width="860" height="560"></canvas>
          </div>
          <div class="legend" id="legend"></div>
        </div>

        <!-- Numeracion de piezas -->
        <div class="canvas-section" id="piece-list-area" style="display:none">
          <h2 class="panel-title" style="margin-bottom:10px">Orden de corte</h2>
          <div id="piece-list"></div>
        </div>
      </section>
    </section>

    <footer class="footer">OptiGlass - Optimizador de corte v1.4</footer>
  </main>

  <!-- Modal historial -->
  <div class="modal-overlay" id="history-modal" style="display:none">
    <div class="modal">
      <div class="modal-head">
        <h2 class="panel-title">Historial de pedidos</h2>
        <button class="btn subtle" id="history-close">Cerrar</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'optiglass-state-v4';
    const HISTORY_KEY = 'optiglass-history-v1';
    const DEFAULT_SHEET_W = 250;
    const DEFAULT_SHEET_H = 360;
    const DEFAULT_THICKNESS = '6';
    const THICKNESS_OPTIONS = [
      { value: '4', label: '4 mm', use: 'Para ventanas pequenas o claraboyas', kerf: 2, mode: 'Corte delicado con separacion ajustada.' },
      { value: '6', label: '6 mm', use: 'Usado en ventanas de viviendas y mesas', kerf: 3, mode: 'Corte estandar para piezas de uso comun.' },
      { value: '8', label: '8 mm', use: 'Ideal para puertas de ducha', kerf: 4, mode: 'Corte reforzado con mas separacion.' },
      { value: '10', label: '10 mm o mas', use: 'Para mamparas y divisiones de oficina', kerf: 5, mode: 'Corte pesado con mayor cuidado de manipulacion.' }
    ];
    const COLORS = [
      '#2BB3A3','#E6A23C','#4E8DEB','#D96953','#7BAE46','#B66CCB',
      '#35A7C9','#D48A2F','#6B86D6','#CC5C8A','#21A06E','#A77A42'
    ];

    const state = { sheetW: DEFAULT_SHEET_W, sheetH: DEFAULT_SHEET_H, thickness: DEFAULT_THICKNESS, kerf: 3, cuts: [], clientName: '', clientNotes: '' };
    let cutId = 1;
    let lastPacks = [];     // array de packs (una por lamina)
    let activeSheet = 0;

    const els = {
      sheetW:        document.getElementById('sheet-w'),
      sheetH:        document.getElementById('sheet-h'),
      thickness:     document.getElementById('thickness'),
      thicknessHint: document.getElementById('thickness-hint'),
      kerf:          document.getElementById('kerf'),
      priceM2:       document.getElementById('price-m2'),
      clientName:    document.getElementById('client-name'),
      clientNotes:   document.getElementById('client-notes'),
      cutsList:      document.getElementById('cuts-list'),
      errMsg:        document.getElementById('err-msg'),
      calcBtn:       document.getElementById('calc-btn'),
      addBtn:        document.getElementById('add-btn'),
      sampleBtn:     document.getElementById('sample-btn'),
      clearBtn:      document.getElementById('clear-btn'),
      exportBtn:     document.getElementById('export-btn'),
      historyBtn:    document.getElementById('history-btn'),
      resultArea:    document.getElementById('result-area'),
      metrics:       document.getElementById('metrics'),
      adviceBox:     document.getElementById('advice-box'),
      canvasWrap:    document.getElementById('canvas-wrap'),
      canvas:        document.getElementById('cv'),
      legend:        document.getElementById('legend'),
      multiArea:     document.getElementById('multi-sheets-area'),
      multiLabel:    document.getElementById('multi-sheets-label'),
      sheetTabs:     document.getElementById('sheet-tabs'),
      sheetIndicator:document.getElementById('sheet-indicator'),
      pieceListArea: document.getElementById('piece-list-area'),
      pieceList:     document.getElementById('piece-list'),
      historyModal:  document.getElementById('history-modal'),
      historyList:   document.getElementById('history-list'),
      historyClose:  document.getElementById('history-close'),
    };

    // === INIT ===
    els.thickness.addEventListener('change', () => {
      const option = getThicknessOption();
      state.thickness = option.value;
      els.kerf.min = option.kerf;
      els.kerf.value = option.kerf;
      state.kerf = option.kerf;
      updateThicknessHint();
      resetResult();
    });
    [els.sheetW, els.sheetH, els.kerf].forEach(input => input.addEventListener('input', () => { syncSheetState(); resetResult(); saveState(); }));
    [els.clientName, els.clientNotes].forEach(input => input.addEventListener('input', () => { state.clientName = els.clientName.value; state.clientNotes = els.clientNotes.value; saveState(); }));
    els.addBtn.addEventListener('click', () => addCut());
    els.calcBtn.addEventListener('click', calculate);
    els.sampleBtn.addEventListener('click', loadSample);
    els.clearBtn.addEventListener('click', clearAll);
    els.exportBtn.addEventListener('click', exportPdf);
    els.historyBtn.addEventListener('click', openHistory);
    els.historyClose.addEventListener('click', () => { els.historyModal.style.display = 'none'; });
    els.historyModal.addEventListener('click', e => { if (e.target === els.historyModal) els.historyModal.style.display = 'none'; });

    window.addEventListener('resize', () => { if (lastPacks.length) drawCanvas(lastPacks[activeSheet].placed, state.sheetW, state.sheetH, activeSheet); });

    function init() {
      updateThicknessHint();
      if (!loadState()) loadSample(false);
      renderCuts();
    }
    init();

    function syncSheetState() {
      state.sheetW = parseFloat(els.sheetW.value) || DEFAULT_SHEET_W;
      state.sheetH = parseFloat(els.sheetH.value) || DEFAULT_SHEET_H;
      state.kerf = parseFloat(els.kerf.value) || 3;
    }

    function hydrateSheetInputs() {
      els.sheetW.value = state.sheetW;
      els.sheetH.value = state.sheetH;
      els.thickness.value = state.thickness;
      els.kerf.value = state.kerf;
      els.clientName.value = state.clientName || '';
      els.clientNotes.value = state.clientNotes || '';
      updateThicknessHint();
    }

    // === CUTS ===
    function addCut(w = '', h = '', qty = 1) {
      state.cuts.push({ id: cutId++, w, h, qty });
      renderCuts(); saveState();
    }

    function duplicateCut(id) {
      const source = state.cuts.find(c => c.id === id);
      if (source) { state.cuts.push({ id: cutId++, w: source.w, h: source.h, qty: source.qty }); renderCuts(); saveState(); }
    }

    function removeCut(id) {
      state.cuts = state.cuts.filter(c => c.id !== id);
      renderCuts(); resetResult(); saveState();
    }

    function updateCut(id, field, value) {
      const cut = state.cuts.find(c => c.id === id);
      if (cut) { cut[field] = value; resetResult(); saveState(); }
    }

    function renderCuts() {
      if (state.cuts.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'cuts-empty';
        empty.textContent = 'Sin piezas. Agrega al menos una.';
        els.cutsList.replaceChildren(empty);
        return;
      }
      const rows = state.cuts.map((cut, idx) => {
        const row = document.createElement('div');
        row.className = 'cut-row';
        row.innerHTML = `
          <span class="cut-index">${idx + 1}</span>
          <input type="number" min="1" step="0.1" placeholder="Ancho" value="${escapeAttr(cut.w)}" inputmode="decimal" aria-label="Ancho pieza ${idx+1}">
          <input type="number" min="1" step="0.1" placeholder="Alto" value="${escapeAttr(cut.h)}" inputmode="decimal" aria-label="Alto pieza ${idx+1}">
          <input type="number" min="1" step="1" placeholder="Cant" value="${escapeAttr(cut.qty)}" inputmode="numeric" aria-label="Cantidad pieza ${idx+1}">
          <button class="icon-btn" title="Duplicar" aria-label="Duplicar pieza ${idx+1}">⊕</button>
          <button class="icon-btn danger" title="Eliminar" aria-label="Eliminar pieza ${idx+1}">✕</button>
        `;
        const [wInput, hInput, qInput] = row.querySelectorAll('input');
        wInput.addEventListener('input', () => updateCut(cut.id, 'w', wInput.value));
        hInput.addEventListener('input', () => updateCut(cut.id, 'h', hInput.value));
        qInput.addEventListener('input', () => updateCut(cut.id, 'qty', qInput.value));
        row.querySelectorAll('button')[0].addEventListener('click', () => duplicateCut(cut.id));
        row.querySelectorAll('button')[1].addEventListener('click', () => removeCut(cut.id));
        return row;
      });
      els.cutsList.replaceChildren(...rows);
    }

    // === CALCULATE ===
    function calculate() {
      hideError();
      const validation = buildPieces();
      if (validation.error) { showError(validation.error); return; }

      const { sheetW, sheetH, kerfMm, kerfCm, thickness, pieces } = validation;
      state.sheetW = sheetW; state.sheetH = sheetH;

      // Algoritmo multi-lamina
      const allPacks = [];
      let remaining = [...pieces];
      let sheetIndex = 0;

      while (remaining.length > 0) {
        const pack = findBestPack(remaining, sheetW, sheetH, kerfCm);
        if (!pack || pack.placed.length === 0) { showError('Hay piezas que no caben en la lamina. Revisa las dimensiones.'); return; }
        // Marcar numero de lamina y numero de pieza global
        pack.placed.forEach((p, i) => { p.sheetIndex = sheetIndex; p.pieceNum = allPacks.reduce((s, pk) => s + pk.placed.length, 0) + i + 1; });
        allPacks.push({ ...pack, sheetW, sheetH, kerfMm, thickness });
        const placedOrigIds = new Set(pack.placed.map(p => p.origId));
        remaining = remaining.filter(p => !placedOrigIds.has(p.origId));
        sheetIndex++;
        if (sheetIndex > 20) break; // safety
      }

      lastPacks = allPacks;
      activeSheet = 0;
      saveToHistory(allPacks, sheetW, sheetH, kerfMm, thickness);
      renderResult(allPacks, sheetW, sheetH);
    }

    function buildPieces() {
      const sheetW = parsePositive(els.sheetW.value);
      const sheetH = parsePositive(els.sheetH.value);
      const kerfMm = parseNonNegative(els.kerf.value);
      const thickness = getThicknessOption();

      if (!sheetW || !sheetH) return { error: 'Las dimensiones de la lamina deben ser mayores que cero.' };
      if (kerfMm === null || kerfMm > 20) return { error: 'El kerf debe estar entre 0 y 20 mm.' };
      if (kerfMm < thickness.kerf) return { error: `Para vidrio de ${thickness.label}, usa un kerf minimo de ${formatMm(thickness.kerf)} mm.` };
      if (state.cuts.length === 0) return { error: 'Agrega al menos una pieza.' };

      const pieces = [];
      const kerfCm = kerfMm / 10;
      let pieceCounter = 0;

      for (const [index, cut] of state.cuts.entries()) {
        const w = parsePositive(cut.w), h = parsePositive(cut.h), qty = parseInteger(cut.qty);
        const label = `Pieza ${index + 1}`;
        if (!w || !h) return { error: `${label}: ancho y alto deben ser mayores que cero.` };
        if (!qty || qty < 1) return { error: `${label}: la cantidad debe ser al menos 1.` };
        if (!fitsAnyOrientation(w, h, sheetW, sheetH)) return { error: `${label} (${w} x ${h} cm) no cabe en la lamina (${sheetW} x ${sheetH} cm).` };
        const color = COLORS[(index) % COLORS.length];
        for (let i = 0; i < qty; i++) {
          pieces.push({ w, h, origW: w, origH: h, color, label, origId: pieceCounter++, cutIndex: index });
        }
      }
      return { sheetW, sheetH, kerfMm, kerfCm, thickness, pieces };
    }

    // === PACK ALGORITHM ===
    function findBestPack(pieces, sheetW, sheetH, kerfCm) {
      const sorters = [
        (a, b) => b.w * b.h - a.w * a.h,
        (a, b) => Math.max(b.w, b.h) - Math.max(a.w, a.h),
        (a, b) => b.w - a.w,
        (a, b) => b.h - a.h,
        (a, b) => Math.abs(b.w - b.h) - Math.abs(a.w - a.h)
      ];
      let best = null;
      for (const sorter of sorters) {
        const ordered = [...pieces].sort(sorter);
        const pack = guillotinePack(ordered, sheetW, sheetH, kerfCm);
        best = chooseBetterPack(best, pack, pieces.length, sheetW, sheetH);
        if (best && best.placed.length === pieces.length) break;
      }
      return best;
    }

    function chooseBetterPack(current, candidate, totalPieces, sheetW, sheetH) {
      if (!candidate) return current;
      if (!current) return candidate;
      if (candidate.placed.length > current.placed.length) return candidate;
      if (candidate.placed.length === current.placed.length && candidate.freeArea < current.freeArea) return candidate;
      return current;
    }

    function guillotinePack(pieces, sheetW, sheetH, kerfCm) {
      const freeRects = [{ x: 0, y: 0, w: sheetW, h: sheetH }];
      const placed = [];
      for (const piece of pieces) {
        let best = null, bestIdx = -1;
        for (let i = 0; i < freeRects.length; i++) {
          const rect = freeRects[i];
          for (const rotated of [false, true]) {
            const w = rotated ? piece.h : piece.w;
            const h = rotated ? piece.w : piece.h;
            if (w <= rect.w + 0.001 && h <= rect.h + 0.001) {
              const shortSide = Math.min(rect.w - w, rect.h - h);
              if (!best || shortSide < best.score) { best = { w, h, rotated, score: shortSide }; bestIdx = i; }
            }
          }
        }
        if (!best) continue;
        const rect = freeRects[bestIdx];
        placed.push({ ...piece, x: rect.x, y: rect.y, w: best.w, h: best.h, origW: piece.origW, origH: piece.origH, rotated: best.rotated });
        const splitH = best.w < best.h;
        freeRects.splice(bestIdx, 1);
        const rightW = rect.w - best.w - kerfCm;
        const bottomH = rect.h - best.h - kerfCm;
        if (splitH) {
          if (rightW > 0.001) freeRects.push({ x: rect.x + best.w + kerfCm, y: rect.y, w: rightW, h: rect.h });
          if (bottomH > 0.001) freeRects.push({ x: rect.x, y: rect.y + best.h + kerfCm, w: best.w, h: bottomH });
        } else {
          if (bottomH > 0.001) freeRects.push({ x: rect.x, y: rect.y + best.h + kerfCm, w: rect.w, h: bottomH });
          if (rightW > 0.001) freeRects.push({ x: rect.x + best.w + kerfCm, y: rect.y, w: rightW, h: best.h });
        }
        pruneFreeRects(freeRects);
      }
      const freeArea = calculateFreeArea(freeRects);
      const largestFreeRect = getLargestFreeRect(freeRects);
      return { placed, freeRects, freeArea, largestFreeRect };
    }

    function pruneFreeRects(rects) {
      for (let i = rects.length - 1; i >= 0; i--) {
        const a = rects[i];
        if (a.w <= 0.001 || a.h <= 0.001) { rects.splice(i, 1); continue; }
        for (let j = rects.length - 1; j >= 0; j--) {
          if (i === j) continue;
          if (isContainedIn(a, rects[j])) { rects.splice(i, 1); break; }
        }
      }
    }

    // === RENDER RESULT ===
    function renderResult(allPacks, sheetW, sheetH) {
      const totalPieces = allPacks.reduce((s, p) => s + p.placed.length, 0);
      const totalSheetArea = allPacks.length * sheetW * sheetH;
      const totalUsed = allPacks.reduce((s, p) => s + p.placed.reduce((ss, pc) => ss + pc.origW * pc.origH, 0), 0);
      const usedPct = totalUsed / totalSheetArea * 100;
      const wastePct = 100 - usedPct;
      const wasteArea = totalSheetArea - totalUsed;
      const efficiencyClass = usedPct >= 85 ? 'good' : usedPct >= 65 ? 'warn' : 'bad';
      const priceM2 = parseFloat(els.priceM2.value);
      const hasPrice = priceM2 > 0;

      els.resultArea.classList.add('visible');
      els.exportBtn.disabled = false;

      // Metricas
      els.metrics.innerHTML = `
        <div class="metric ${efficiencyClass}"><div class="value">${usedPct.toFixed(1)}%</div><div class="label">Aprovechamiento</div></div>
        <div class="metric"><div class="value">${wastePct.toFixed(1)}%</div><div class="label">Desperdicio</div></div>
        <div class="metric"><div class="value">${totalPieces}</div><div class="label">Piezas colocadas</div></div>
        <div class="metric"><div class="value">${allPacks.length}</div><div class="label">Laminas necesarias</div></div>
      `;

      // Advice
      const largest = allPacks[0].largestFreeRect;
      const freeText = largest ? ` Mayor sobrante en lamina 1: ${formatRect(largest)} (${formatArea(largest.w * largest.h)}).` : '';
      const thicknessText = allPacks[0].thickness ? ` Espesor: ${allPacks[0].thickness.label}. ${allPacks[0].thickness.use}. Kerf: ${formatMm(allPacks[0].kerfMm)} mm.` : '';
      let advice = usedPct >= 85
        ? `Corte eficiente: se aprovecha el ${usedPct.toFixed(1)}% en ${allPacks.length} lamina(s).${freeText}${thicknessText}`
        : usedPct >= 65
        ? `Corte aceptable: se aprovecha el ${usedPct.toFixed(1)}% en ${allPacks.length} lamina(s). Considera agregar mas piezas para reducir el sobrante.${freeText}${thicknessText}`
        : `Corte ineficiente: solo el ${usedPct.toFixed(1)}% aprovechado en ${allPacks.length} lamina(s). Conviene revisar tamanios o agrupar pedidos.${freeText}${thicknessText}`;
      els.adviceBox.className = `advice ${efficiencyClass}`;
      els.adviceBox.textContent = advice;

      // Costos
      const costBlock = document.getElementById('cost-block');
      if (costBlock) costBlock.remove();
      if (hasPrice) {
        const usedAreaM2 = totalUsed / 10000;
        const wasteAreaM2 = wasteArea / 10000;
        const totalSheetM2 = totalSheetArea / 10000;
        const costTotal = totalSheetM2 * priceM2;
        const costUsed = usedAreaM2 * priceM2;
        const costWaste = wasteAreaM2 * priceM2;
        const block = document.createElement('div');
        block.id = 'cost-block';
        block.className = 'cost-block';
        block.innerHTML = `
          <div class="cost-row"><span>Costo total de la(s) lamina(s)</span><strong>${formatCOP(costTotal)}</strong></div>
          <div class="cost-row"><span>Costo del material aprovechado</span><strong>${formatCOP(costUsed)}</strong></div>
          <div class="cost-row"><span>Costo del desperdicio</span><strong>${formatCOP(costWaste)}</strong></div>
        `;
        els.adviceBox.insertAdjacentElement('afterend', block);
      }

      // Tabs multi-lamina
      if (allPacks.length > 1) {
        els.multiArea.style.display = '';
        els.multiLabel.textContent = `${allPacks.length} laminas necesarias.`;
        els.sheetTabs.innerHTML = allPacks.map((_, i) =>
          `<button class="sheet-tab${i === 0 ? ' active' : ''}" data-idx="${i}">Lamina ${i + 1}</button>`
        ).join('');
        els.sheetTabs.querySelectorAll('.sheet-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            activeSheet = parseInt(btn.dataset.idx);
            els.sheetTabs.querySelectorAll('.sheet-tab').forEach(b => b.classList.toggle('active', b === btn));
            drawCanvas(lastPacks[activeSheet].placed, sheetW, sheetH, activeSheet);
            renderLegend(lastPacks[activeSheet].placed);
          });
        });
      } else {
        els.multiArea.style.display = 'none';
      }

      drawCanvas(allPacks[0].placed, sheetW, sheetH, 0);
      renderLegend(allPacks[0].placed);
      renderPieceList(allPacks);
    }

    // === CANVAS ===
    function drawCanvas(placed, sheetW, sheetH, sheetIdx) {
      const cssWidth = Math.max(320, els.canvasWrap.clientWidth - 2);
      const scale = cssWidth / sheetW;
      const canvasW = cssWidth;
      const canvasH = Math.max(180, Math.round(sheetH * scale));
      const dpr = window.devicePixelRatio || 1;
      const ctx = els.canvas.getContext('2d');
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      els.canvas.style.width = '';
      els.canvas.style.height = `${canvasH}px`;
      els.canvas.width = Math.round(canvasW * dpr);
      els.canvas.height = Math.round(canvasH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, canvasW, canvasH);

      ctx.fillStyle = dark ? '#263437' : '#eef2f3';
      ctx.fillRect(0, 0, canvasW, canvasH);
      drawGrid(ctx, canvasW, canvasH);
      ctx.strokeStyle = dark ? '#83949b' : '#9facb3';
      ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 0.5, canvasW - 1, canvasH - 1);

      placed.forEach((piece, i) => {
        const x = Math.round(piece.x * scale);
        const y = Math.round(piece.y * scale);
        const w = Math.max(1, Math.round(piece.w * scale));
        const h = Math.max(1, Math.round(piece.h * scale));

        ctx.fillStyle = `${piece.color}cc`;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = piece.color;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.5, y + 0.5, Math.max(0, w - 1), Math.max(0, h - 1));

        // Numero de pieza en esquina
        const num = piece.pieceNum || (i + 1);
        const numSize = Math.max(9, Math.min(12, w * 0.25, h * 0.25));
        ctx.fillStyle = piece.color;
        ctx.fillRect(x + 2, y + 2, numSize + 6, numSize + 4);
        ctx.fillStyle = '#fff';
        ctx.font = `700 ${numSize}px ${getComputedStyle(document.body).fontFamily}`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(num, x + 5, y + 4);

        // Label central
        const label = `${formatCm(piece.origW)}x${formatCm(piece.origH)}${piece.rotated ? ' R' : ''}`;
        const fontSize = Math.max(9, Math.min(13, w / Math.max(5, label.length * 0.55), h * 0.34));
        ctx.font = `700 ${fontSize}px ${getComputedStyle(document.body).fontFamily}`;
        const textW = ctx.measureText(label).width;
        if (textW + 9 < w && fontSize + 7 < h) {
          const tx = x + w / 2, ty = y + h / 2;
          ctx.fillStyle = dark ? 'rgba(16,23,25,0.72)' : 'rgba(255,255,255,0.82)';
          ctx.fillRect(tx - textW / 2 - 4, ty - fontSize / 2 - 3, textW + 8, fontSize + 7);
          ctx.fillStyle = dark ? '#edf3f4' : '#172025';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, tx, ty);
        }
      });

      els.sheetIndicator.textContent = lastPacks.length > 1 ? `Lamina ${sheetIdx + 1} de ${lastPacks.length}` : '';
    }

    function drawGrid(ctx, width, height) {
      ctx.save();
      ctx.strokeStyle = 'rgba(127,145,152,0.16)';
      ctx.lineWidth = 1;
      for (let x = 40; x < width; x += 40) { ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, height); ctx.stroke(); }
      for (let y = 40; y < height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(width, y + 0.5); ctx.stroke(); }
      ctx.restore();
    }

    function renderLegend(placed) {
      const groups = new Map();
      for (const piece of placed) {
        const key = `${formatCm(piece.origW)} x ${formatCm(piece.origH)} cm`;
        const entry = groups.get(key) || { color: piece.color, count: 0, rotated: false };
        entry.count += 1;
        entry.rotated = entry.rotated || piece.rotated;
        groups.set(key, entry);
      }
      const items = [...groups.entries()].map(([label, item]) =>
        `<span class="legend-item"><span class="legend-dot" style="background:${item.color}"></span>${label} (${item.count})${item.rotated ? ' rotada' : ''}</span>`
      );
      items.push(`<span class="legend-item"><span class="legend-dot" style="background:rgba(127,145,152,0.18);border-color:rgba(127,145,152,0.42)"></span>Sobrante</span>`);
      els.legend.innerHTML = items.join('');
    }

    // === ORDEN DE CORTE ===
    function renderPieceList(allPacks) {
      els.pieceListArea.style.display = '';
      let rows = '';
      allPacks.forEach((pack, si) => {
        pack.placed.forEach((p, i) => {
          const num = p.pieceNum || (i + 1);
          rows += `<tr>
            <td><span class="piece-num" style="background:${p.color}">${num}</span></td>
            <td>${allPacks.length > 1 ? `Lamina ${si + 1}` : '—'}</td>
            <td>${formatCm(p.origW)} × ${formatCm(p.origH)} cm</td>
            <td>${p.rotated ? 'Si' : 'No'}</td>
            <td>${formatCm(p.x)} , ${formatCm(p.y)}</td>
          </tr>`;
        });
      });
      els.pieceList.innerHTML = `
        <table class="piece-list-table">
          <thead><tr><th>#</th><th>Lamina</th><th>Medida</th><th>Rotada</th><th>Posicion (x, y)</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // === HISTORIAL ===
    function saveToHistory(allPacks, sheetW, sheetH, kerfMm, thickness) {
      const history = loadHistory();
      const entry = {
        id: Date.now(),
        date: new Date().toLocaleString('es-CO'),
        client: els.clientName.value || 'Sin nombre',
        notes: els.clientNotes.value || '',
        sheetW, sheetH, kerfMm,
        thickness: thickness ? thickness.label : '',
        sheets: allPacks.length,
        pieces: allPacks.reduce((s, p) => s + p.placed.length, 0),
        cuts: state.cuts.map(c => ({ w: c.w, h: c.h, qty: c.qty }))
      };
      history.unshift(entry);
      if (history.length > 50) history.splice(50);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
    }

    function openHistory() {
      const history = loadHistory();
      if (history.length === 0) {
        els.historyList.innerHTML = '<p class="history-empty">No hay pedidos guardados aun.</p>';
      } else {
        els.historyList.innerHTML = history.map(e => `
          <div class="history-item" data-id="${e.id}">
            <div class="history-item-head">
              <span class="history-client">${e.client}</span>
              <span class="history-date">${e.date}</span>
            </div>
            <div class="history-meta">${e.sheetW}×${e.sheetH} cm · ${e.thickness} · ${e.pieces} piezas · ${e.sheets} lamina(s)${e.notes ? ' · ' + e.notes : ''}</div>
          </div>
        `).join('');
        els.historyList.querySelectorAll('.history-item').forEach(item => {
          item.addEventListener('click', () => {
            const entry = history.find(e => e.id === parseInt(item.dataset.id));
            if (entry) { loadFromHistory(entry); els.historyModal.style.display = 'none'; }
          });
        });
      }
      const actionsEl = els.historyList.querySelector('.history-actions');
      if (!actionsEl && history.length > 0) {
        const actions = document.createElement('div');
        actions.className = 'history-actions';
        actions.innerHTML = `<button class="btn subtle" id="clear-history-btn">Borrar historial</button>`;
        els.historyList.appendChild(actions);
        document.getElementById('clear-history-btn').addEventListener('click', () => {
          localStorage.removeItem(HISTORY_KEY);
          els.historyList.innerHTML = '<p class="history-empty">Historial borrado.</p>';
        });
      }
      els.historyModal.style.display = 'flex';
    }

    function loadFromHistory(entry) {
      state.sheetW = entry.sheetW;
      state.sheetH = entry.sheetH;
      state.kerf = entry.kerfMm;
      state.clientName = entry.client !== 'Sin nombre' ? entry.client : '';
      state.clientNotes = entry.notes || '';
      state.cuts = entry.cuts.map(c => ({ id: cutId++, w: c.w, h: c.h, qty: c.qty }));
      const thicknessVal = THICKNESS_OPTIONS.find(t => t.label === entry.thickness)?.value || DEFAULT_THICKNESS;
      state.thickness = thicknessVal;
      hydrateSheetInputs();
      renderCuts();
      resetResult();
      saveState();
    }

    // === EXPORT PDF ===
    function exportPdf() {
      if (!lastPacks.length) return;
      const client = els.clientName.value || 'Sin nombre';
      const notes = els.clientNotes.value;
      const date = new Date().toLocaleDateString('es-CO');
      const imgData = els.canvas.toDataURL('image/png');
      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>OptiGlass - ${client}</title>
      <style>
        body { font-family: system-ui, sans-serif; padding: 32px; color: #172025; }
        h1 { font-size: 22px; margin: 0 0 4px; }
        .sub { color: #65737c; font-size: 13px; margin-bottom: 24px; }
        .meta { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 20px; font-size: 13px; }
        .meta div { display: flex; flex-direction: column; gap: 2px; }
        .meta strong { font-size: 11px; color: #65737c; text-transform: uppercase; letter-spacing: 0.05em; }
        img { max-width: 100%; border: 1px solid #d5dade; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 6px 10px; color: #65737c; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #d5dade; }
        td { padding: 6px 10px; border-bottom: 1px solid #eef2f3; }
        @media print { body { padding: 16px; } }
      </style></head><body>
      <h1>OptiGlass - Orden de corte</h1>
      <p class="sub">Generado el ${date}</p>
      <div class="meta">
        <div><strong>Cliente</strong>${client}</div>
        ${notes ? `<div><strong>Notas</strong>${notes}</div>` : ''}
        <div><strong>Lamina</strong>${state.sheetW} × ${state.sheetH} cm</div>
        <div><strong>Laminas necesarias</strong>${lastPacks.length}</div>
        <div><strong>Total piezas</strong>${lastPacks.reduce((s,p)=>s+p.placed.length,0)}</div>
      </div>
      <img src="${imgData}">
      <table>
        <thead><tr><th>#</th><th>Lamina</th><th>Medida</th><th>Rotada</th><th>Posicion</th></tr></thead>
        <tbody>
          ${lastPacks.map((pack, si) => pack.placed.map((p, i) =>
            `<tr><td>${p.pieceNum || i+1}</td><td>${lastPacks.length > 1 ? si+1 : '—'}</td><td>${formatCm(p.origW)} × ${formatCm(p.origH)} cm</td><td>${p.rotated ? 'Si' : 'No'}</td><td>${formatCm(p.x)}, ${formatCm(p.y)}</td></tr>`
          ).join('')).join('')}
        </tbody>
      </table>
      <script>window.onload=()=>window.print();<\/script>
      </body></html>`);
      win.document.close();
    }

    // === STATE ===
    function clearAll() {
      const thickness = getThicknessOption(DEFAULT_THICKNESS);
      state.sheetW = DEFAULT_SHEET_W; state.sheetH = DEFAULT_SHEET_H;
      state.thickness = thickness.value; state.kerf = thickness.kerf;
      state.cuts = []; state.clientName = ''; state.clientNotes = '';
      hydrateSheetInputs(); renderCuts(); resetResult(); saveState();
    }

    function loadSample(shouldSave = true) {
      const thickness = getThicknessOption(DEFAULT_THICKNESS);
      state.sheetW = DEFAULT_SHEET_W; state.sheetH = DEFAULT_SHEET_H;
      state.thickness = thickness.value; state.kerf = thickness.kerf;
      state.clientName = 'Cliente ejemplo'; state.clientNotes = 'Pedido de muestra';
      state.cuts = [
        { id: cutId++, w: 60, h: 40, qty: 2 },
        { id: cutId++, w: 80, h: 60, qty: 1 },
        { id: cutId++, w: 30, h: 30, qty: 3 },
        { id: cutId++, w: 45, h: 35, qty: 2 }
      ];
      hydrateSheetInputs(); renderCuts(); resetResult();
      if (shouldSave) saveState();
    }

    function resetResult(options = {}) {
      lastPacks = []; activeSheet = 0;
      els.resultArea.classList.remove('visible');
      els.exportBtn.disabled = true;
      els.pieceListArea.style.display = 'none';
      els.multiArea.style.display = 'none';
      const costBlock = document.getElementById('cost-block');
      if (costBlock) costBlock.remove();
      if (!options.keepError) hideError();
    }

    function saveState() {
      const snapshot = {
        sheetW: els.sheetW.value, sheetH: els.sheetH.value,
        thickness: els.thickness.value, kerf: els.kerf.value,
        clientName: els.clientName.value, clientNotes: els.clientNotes.value,
        cuts: state.cuts
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const saved = JSON.parse(raw);
        if (!Array.isArray(saved.cuts)) return false;
        const thickness = getThicknessOption(saved.thickness ?? DEFAULT_THICKNESS);
        state.sheetW = saved.sheetW ?? DEFAULT_SHEET_W;
        state.sheetH = saved.sheetH ?? DEFAULT_SHEET_H;
        state.thickness = thickness.value;
        state.kerf = saved.kerf ?? thickness.kerf;
        state.clientName = saved.clientName || '';
        state.clientNotes = saved.clientNotes || '';
        state.cuts = saved.cuts.map(cut => ({ ...cut, id: cutId++ }));
        hydrateSheetInputs();
        return true;
      } catch { return false; }
    }

    // === UTILS ===
    function showError(message) { resetResult({ keepError: true }); els.errMsg.textContent = message; els.errMsg.classList.add('visible'); }
    function hideError() { els.errMsg.textContent = ''; els.errMsg.classList.remove('visible'); }
    function parsePositive(value) { const n = Number.parseFloat(value); return Number.isFinite(n) && n > 0 ? n : null; }
    function parseNonNegative(value) { if (value === '') return null; const n = Number.parseFloat(value); return Number.isFinite(n) && n >= 0 ? n : null; }
    function parseInteger(value) { const n = Number(value); return Number.isInteger(n) ? n : null; }
    function fitsAnyOrientation(w, h, sW, sH) { return (w <= sW && h <= sH) || (h <= sW && w <= sH); }
    function getThicknessOption(value = els.thickness.value) { return THICKNESS_OPTIONS.find(o => o.value === value) || THICKNESS_OPTIONS.find(o => o.value === DEFAULT_THICKNESS); }
    function updateThicknessHint() { const o = getThicknessOption(); els.kerf.min = o.kerf; els.thicknessHint.textContent = `${o.use}. ${o.mode} Kerf minimo sugerido: ${formatMm(o.kerf)} mm.`; }
    function calculateFreeArea(rects) { return rects.reduce((s, r) => s + r.w * r.h, 0); }
    function getLargestFreeRect(rects) { return rects.reduce((best, r) => (!best || r.w * r.h > best.w * best.h) ? { ...r } : best, null); }
    function isContainedIn(a, b) { return a.x >= b.x - 0.001 && a.y >= b.y - 0.001 && a.x + a.w <= b.x + b.w + 0.001 && a.y + a.h <= b.y + b.h + 0.001; }
    function formatCm(v) { return Number(v).toLocaleString('es-CO', { maximumFractionDigits: 1 }); }
    function formatMm(v) { return Number(v).toLocaleString('es-CO', { maximumFractionDigits: 1 }); }
    function formatArea(v) { return v >= 10000 ? `${(v/10000).toLocaleString('es-CO',{maximumFractionDigits:2})} m2` : `${v.toLocaleString('es-CO',{maximumFractionDigits:0})} cm2`; }
    function formatRect(r) { return `${formatCm(r.w)} x ${formatCm(r.h)} cm`; }
    function formatCOP(v) { return v.toLocaleString('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }); }
    function escapeAttr(v) { return String(v ?? '').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;'); }
  </script>
</body>
</html>
